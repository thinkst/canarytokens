name: Run Cypress Tests
on:
  #push:
  #  branches:
  #    - master
  #    - dev
  #    - dev2
  workflow_run:
    workflows: ["Build Docker Image"]
    types: [requested, completed]

  workflow_call:
    inputs:
      branch:
        required: true
        type: string

jobs:
  chrome:
    runs-on: ubuntu-latest
    name: E2E on Chrome
    steps:
      - name: Checkout 🔖
        uses: actions/checkout@v4.2.0
        with:
          ref: "${{ inputs.branch }}"

      - name: Setup Node.js 🔨
        uses: actions/setup-node@v4.0.4
        with:
          node-version: 20

      - name: Set Test Domain Environment Variable
        run: |
          if [ "${{ inputs.branch }}" == "master" ]; then
            echo "TEST_DOMAIN=ssl-secure-srv.org" >> $GITHUB_ENV
          elif [ "${{ inputs.branch }}" == "dev" ]; then
            echo "TEST_DOMAIN=honeypdfs.com" >> $GITHUB_ENV
          elif [ "${{ inputs.branch }}" == "dev2" ]; then
            echo "TEST_DOMAIN=syruppdfs.com" >> $GITHUB_ENV
          else
            echo "${{ inputs.branch }}: No matching branch for domain testing. Exiting." && exit 1
          fi

      - name: Debug Test Domain
        run: echo "TEST_DOMAIN=${{ env.TEST_DOMAIN }}"

      #- name: Execute Cypress Tests 🌡️
